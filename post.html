<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章</title>
    <link rel="stylesheet" href="style.css">
    <!-- KaTeX: 数学公式渲染 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <!-- marked.js: Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>
<body>
    <div id="content">
        <a class="back" href="index.html">← 返回主页</a>
        <div id="article">加载中...</div>
        <footer><p>© 2026 m0re1s · Powered by GitHub Pages</p></footer>
    </div>

    <script>
        // 从 URL 获取要加载的 markdown 文件名
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        if (!file) {
            document.getElementById('article').innerHTML = '<p>未指定文件。</p>';
        } else {
            // 读取 markdown 文件并渲染
            fetch('posts/' + file)
                .then(r => r.text())
                .then(text => {
                    document.getElementById('article').innerHTML = marked.parse(text);
                    // 渲染数学公式
                    if (typeof renderMathInElement !== 'undefined') {
                        renderMathInElement(document.getElementById('article'), {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false}
                            ]
                        });
                    }
                    // 更新页面标题
                    const h1 = document.querySelector('#article h1');
                    if (h1) document.title = h1.textContent;
                })
                .catch(() => {
                    document.getElementById('article').innerHTML = '<p>文件加载失败。</p>';
                });
        }
    </script>
</body>
</html>
